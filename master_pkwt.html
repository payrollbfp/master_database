<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master PKWT</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#1d2d5c;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-bottom:20px;
}

.login-box{
max-width:500px;
margin:auto;
margin-top:100px;
}

.login-box input{
width:100%;
height:45px;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
height:40px;
padding:0 15px;
border:none;
border-radius:8px;
background:#1d2d5c;
color:white;
cursor:pointer;
}

button:hover{
background:#2d447f;
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.toolbar input,
.toolbar select{
height:40px;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

.table-container{
overflow:auto;
max-height:650px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1d2d5c;
color:white;
padding:10px;
position:sticky;
top:0;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin-top:15px;
}

.red{
color:red;
font-weight:bold;
}

.orange{
color:orange;
font-weight:bold;
}

.green{
color:green;
font-weight:bold;
}

.gray{
color:#888;
}

.kpi{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.kpi-box{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.kpi-box h2{
color:#1d2d5c;
}

#mainContent{
display:none;
}

@media(max-width:900px){

.kpi{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div id="loginBox" class="login-box card">

<h2>MASTER PKWT</h2>

<br>

<input
type="password"
id="password"
placeholder="Masukkan Password">

<button onclick="cekPassword()">
Masuk
</button>

</div>

<div id="mainContent">

<div class="header">

<div>

<h2>MASTER PKWT</h2>
<p>PT Bintang Fajar Persada</p>

</div>

<div>

<button onclick="location.href='dashboard.html'">
🏠 Home
</button>

</div>

</div>

<div class="container">

<div class="kpi">

<div class="kpi-box">
<p>Total Aktif</p>
<h2 id="kpiAktif">0</h2>
</div>

<div class="kpi-box">
<p>PKWT ≤ 30 Hari</p>
<h2 id="kpi30">0</h2>
</div>

<div class="kpi-box">
<p>PKWT ≤ 60 Hari</p>
<h2 id="kpi60">0</h2>
</div>

<div class="kpi-box">
<p>PKWT Expired</p>
<h2 id="kpiExpired">0</h2>
</div>

</div>

<div class="card">

<div class="toolbar">

<select id="projectFilter">
<option value="">
Pilih Project
</option>
</select>

<button onclick="loadData()">
Load Data
</button>

<input
type="text"
id="search"
placeholder="Cari Nama / Nopeg">

<button onclick="exportExcel()">
Export Excel
</button>

</div>

<b>

Project :
<span id="projectName">-</span>

|

Total Data :
<span id="totalData">0</span>

</b>

<br><br>

<div class="table-container">

<table>

<thead>

<tr>

<th>Project</th>
<th>Nopeg</th>
<th>Nama</th>
<th>TMT</th>
<th>Jabatan</th>
<th>Lokasi Kerja</th>
<th>Tanggal PKWT Terakhir</th>
<th>PKWT Kadaluarsa</th>
<th>Sisa Hari</th>

</tr>

</thead>

<tbody id="tblData">

</tbody>

</table>

</div>

<div class="pagination">

<button onclick="prevPage()">
◀ Prev
</button>

<span id="pageInfo">
Page 1
</span>

<button onclick="nextPage()">
Next ▶
</button>

</div>

</div>

</div>

</div>

<script>

const SUPABASE_URL =
'https://dvhjaxqpoqpeyamtlvgh.supabase.co';

const SUPABASE_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2aGpheHFwb3FwZXlhbXRsdmdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzU1MjAsImV4cCI6MjA5MzcxMTUyMH0.qwX2LZ-9A1ZoLaqkRnZcDValUNKCYoqMvA_Vs79NkWY';

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let masterData=[];
let filteredData=[];

let currentPage=1;
const rowsPerPage=100;

/* LOGIN */

async function cekPassword(){

const pass =
document.getElementById('password').value;

if(pass!=='kontrakkerjabfp'){

alert('Password Salah');
return;

}

document.getElementById('loginBox').style.display='none';
document.getElementById('mainContent').style.display='block';

loadProject();

}

/* PROJECT */

async function loadProject(){

const {data,error}=await
supabaseClient
.from('master_karyawan')
.select('project')
.eq('status_karyawan','Aktif');

if(error){

alert(error.message);
return;

}

const projects =
[...new Set(
data.map(x=>x.project)
)]
.sort();

const ddl =
document.getElementById('projectFilter');

ddl.innerHTML =
'<option value="">Pilih Project</option>';

projects.forEach(p=>{

ddl.innerHTML +=
`<option value="${p}">
${p}
</option>`;

});

}

/* LOAD DATA */

async function loadData(){

const project =
document.getElementById(
'projectFilter'
).value;

if(!project){

alert('Pilih Project');
return;

}

document.getElementById(
'projectName'
).innerHTML =
project;

const {data,error}=await
supabaseClient
.from('master_karyawan')
.select(`
project,
nopeg,
nama,
tmt,
jabatan,
lokasi_kerja,
tanggal_pkwt_terakhir,
pkwt_kadaluarsa,
status_karyawan
`)
.eq('project',project)
.eq('status_karyawan','Aktif');

if(error){

alert(error.message);
return;

}

masterData=data;
filteredData=[...masterData];

currentPage=1;

updateKPI();

document.getElementById(
'totalData'
).innerHTML =
filteredData.length;

renderTable();

}

/* KPI */

function updateKPI(){

const today = new Date();

let aktif = masterData.length;
let hari30 = 0;
let hari60 = 0;
let expired = 0;

masterData.forEach(row=>{

if(!row.pkwt_kadaluarsa)
return;

const exp =
new Date(row.pkwt_kadaluarsa);

const diff =
Math.ceil(
(exp-today)
/(1000*60*60*24)
);

if(diff < 0)
expired++;

if(diff >=0 && diff <=30)
hari30++;

if(diff >=0 && diff <=60)
hari60++;

});

document.getElementById('kpiAktif').innerHTML=aktif;
document.getElementById('kpi30').innerHTML=hari30;
document.getElementById('kpi60').innerHTML=hari60;
document.getElementById('kpiExpired').innerHTML=expired;

}

/* SEARCH */

document.getElementById(
'search'
).addEventListener(
'keyup',
filterData
);

function filterData(){

const keyword =
document.getElementById(
'search'
).value
.toLowerCase();

filteredData=
masterData.filter(row=>{

return (

(row.nama||'')
.toLowerCase()
.includes(keyword)

||

(row.nopeg||'')
.toLowerCase()
.includes(keyword)

);

});

currentPage=1;

document.getElementById(
'totalData'
).innerHTML =
filteredData.length;

renderTable();

}

/* TABLE */

function renderTable(){

const start =
(currentPage-1)
*rowsPerPage;

const end =
start+rowsPerPage;

const pageData =
filteredData.slice(
start,
end
);

let html='';

const today =
new Date();

pageData.forEach(row=>{

let sisa='-';

if(row.pkwt_kadaluarsa){

const exp =
new Date(row.pkwt_kadaluarsa);

const diff =
Math.ceil(
(exp-today)
/(1000*60*60*24)
);

if(diff < 0){

sisa=
`<span class="red">
Expired
</span>`;

}else if(diff <=30){

sisa=
`<span class="red">
${diff} Hari
</span>`;

}else if(diff <=60){

sisa=
`<span class="orange">
${diff} Hari
</span>`;

}else{

sisa=
`<span class="green">
${diff} Hari
</span>`;

}

}else{

sisa=
`<span class="gray">-</span>`;

}

html += `

<tr>

<td>${row.project||''}</td>
<td>${row.nopeg||''}</td>
<td>${row.nama||''}</td>
<td>${row.tmt||''}</td>
<td>${row.jabatan||''}</td>
<td>${row.lokasi_kerja||''}</td>
<td>${row.tanggal_pkwt_terakhir||''}</td>
<td>${row.pkwt_kadaluarsa||''}</td>
<td>${sisa}</td>

</tr>

`;

});

document.getElementById(
'tblData'
).innerHTML =
html;

const totalPages =
Math.ceil(
filteredData.length /
rowsPerPage
);

document.getElementById(
'pageInfo'
).innerHTML =
`Page ${currentPage} / ${totalPages}`;

}

/* PAGINATION */

function nextPage(){

const totalPages =
Math.ceil(
filteredData.length /
rowsPerPage
);

if(currentPage<totalPages){

currentPage++;
renderTable();

}

}

function prevPage(){

if(currentPage>1){

currentPage--;
renderTable();

}

}

/* EXCEL */

function exportExcel(){

if(filteredData.length===0){

alert('Tidak ada data');
return;

}

const ws =
XLSX.utils.json_to_sheet(
filteredData
);

const wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
'PKWT'
);

const project =
document.getElementById(
'projectName'
).innerHTML;

XLSX.writeFile(
wb,
`PKWT_${project}.xlsx`
);

}

</script>

</body>
</html>
