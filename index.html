<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Payroll - PT Bintang Fajar Persada</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef1f4;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:1000px;
    height:600px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.left-panel{
    width:40%;
    background:#f8f8f8;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-right:1px solid #ececec;
}

.left-panel h1{
    text-align:center;
    color:#18366b;
    font-size:28px;
    font-weight:700;
    line-height:1.3;
}

.left-panel p{
    margin-top:20px;
    letter-spacing:3px;
    color:#666;
    font-size:20px;
}

.right-panel{
    width:60%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:400px;
}

.login-box h2{
    color:#18366b;
    font-size:48px;
    margin-bottom:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#333;
    font-weight:600;
}

.form-group input{
    width:100%;
    height:52px;
    border:1px solid #d8d8d8;
    border-radius:12px;
    padding:0 15px;
    font-size:15px;
}

.form-group input:focus{
    outline:none;
    border-color:#18366b;
}

button{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    background:#1f3368;
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#29417e;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:600;
}

@media(max-width:900px){

    .container{
        width:95%;
        height:auto;
        flex-direction:column;
    }

    .left-panel,
    .right-panel{
        width:100%;
        padding:40px 20px;
    }

    .left-panel{
        border-right:none;
        border-bottom:1px solid #eee;
    }

    .login-box{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="left-panel">

        <h1>
            PT BINTANG FAJAR<br>
            PERSADA
        </h1>

        <p>PORTAL PAYROLL</p>

    </div>

    <div class="right-panel">

        <div class="login-box">

            <h2>Login</h2>

            <div class="form-group">
                <label>User</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Masukkan username"
                >
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Masukkan password"
                >
            </div>

            <button onclick="login()">
                Login
            </button>

            <div id="message"></div>

        </div>

    </div>

</div>

<script>

function login(){

    const username =
        document.getElementById("username").value.trim();

    const password =
        document.getElementById("password").value.trim();

    const message =
        document.getElementById("message");

    if(
        username === "Admin" &&
        password === "Bintangfajar123"
    ){

        localStorage.setItem(
            "username",
            username
        );

        message.style.color = "green";
        message.innerHTML = "Login berhasil...";

        setTimeout(()=>{

            window.location.href =
            "dashboard.html";

        },1000);

    }else{

        message.style.color = "red";
        message.innerHTML =
        "Username atau Password salah";

    }

}

</script>

</body>
</html>
