<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard HRIS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
}

.header{

background:#1d2d5c;
color:white;

padding:20px 30px;

display:flex;
justify-content:space-between;
align-items:center;

}

.container{
padding:20px;
}

.card{

background:white;
border-radius:15px;

padding:20px;

margin-bottom:20px;

box-shadow:
0 2px 8px rgba(0,0,0,.08);

}

.summary{

display:grid;
grid-template-columns:
repeat(4,1fr);

gap:15px;

margin-bottom:20px;

}

.summary-box{

background:white;

padding:20px;

border-radius:15px;

text-align:center;

box-shadow:
0 2px 8px rgba(0,0,0,.08);

}

.summary-box h3{
color:#666;
margin-bottom:10px;
}

.summary-box h1{
color:#1d2d5c;
}

.chart-box{
height:450px;
}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#1d2d5c;
color:white;

padding:12px;

}

td{

padding:12px;
border-bottom:1px solid #eee;

}

.menu{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:15px;

}

.menu button{

height:70px;

border:none;

border-radius:15px;

background:white;

font-weight:bold;

color:#1d2d5c;

cursor:pointer;

box-shadow:
0 2px 8px rgba(0,0,0,.08);

}

.menu button:hover{

background:#1d2d5c;
color:white;

}

.red{
color:red;
font-weight:bold;
}

.orange{
color:orange;
font-weight:bold;
}

.green{
color:green;
font-weight:bold;
}

@media(max-width:900px){

.summary{
grid-template-columns:1fr 1fr;
}

.menu{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="header">

<div>

<h2>
PT BINTANG FAJAR PERSADA
</h2>

<p>
Human Resource Information System
</p>

</div>

<div>

<b>Admin</b><br>

<span id="today"></span>

</div>

</div>

<div class="container">

<div class="summary">

<div class="summary-box">

<h3>Karyawan Aktif</h3>

<h1 id="aktif">
0
</h1>

</div>

<div class="summary-box">

<h3>PKWT ≤ 60 Hari</h3>

<h1 id="pkwt">
0
</h1>

</div>

<div class="summary-box">

<h3>MCU ≤ 60 Hari</h3>

<h1 id="mcu">
0
</h1>

</div>

<div class="summary-box">

<h3>Resign</h3>

<h1 id="resign">
0
</h1>

</div>

</div>

<div class="card chart-box">

<h3>
Headcount Aktif per Project
</h3>

<br>

<canvas id="projectChart"></canvas>

</div>

<div class="card">

<h3>
PKWT Akan Berakhir
</h3>

<br>

<table>

<thead>

<tr>

<th>Project</th>
<th>Nopeg</th>
<th>Nama</th>
<th>Jabatan</th>
<th>PKWT Kadaluarsa</th>
<th>Sisa Hari</th>

</tr>

</thead>

<tbody id="tblPKWT">

</tbody>

</table>

</div>

<div class="card">

<h3>
Menu Report
</h3>

<br>

<div class="menu">

<button onclick="location.href='master_reguler.html'">
MASTER REGULER
</button>

<button onclick="location.href='master_bpjs.html'">
MASTER BPJS
</button>

<button onclick="location.href='master_pkwt.html'">
MASTER PKWT
</button>

<button onclick="location.href='master_mcu.html'">
MASTER MCU
</button>

<button onclick="location.href='master_training.html'">
MASTER TRAINING
</button>

<button onclick="location.href='master_turnover.html'">
TURN OVER KARYAWAN
</button>

<button onclick="location.href='master_pajak.html'">
MASTER DATA PAJAK
</button>

</div>

</div>

</div>

<script>

document.getElementById('today')
.innerHTML =
new Date().toLocaleDateString('id-ID');

const SUPABASE_URL =
'https://dvhjaxqpoqpeyamtlvgh.supabase.co';

const SUPABASE_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2aGpheHFwb3FwZXlhbXRsdmdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzU1MjAsImV4cCI6MjA5MzcxMTUyMH0.qwX2LZ-9A1ZoLaqkRnZcDValUNKCYoqMvA_Vs79NkWY';

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

loadDashboard();

async function loadDashboard(){

const { data , error } =
await supabaseClient
.from('master_karyawan')
.select('*');

if(error){

console.log(error);
return;

}

const today =
new Date();

let aktif = 0;
let resign = 0;
let pkwt = 0;
let mcu = 0;

let projectCount = {};

let html = '';

data.forEach(row=>{

if(
row.status_karyawan &&
row.status_karyawan.toUpperCase() === 'AKTIF'
){

aktif++;

if(!projectCount[row.project]){

projectCount[row.project]=0;

}

projectCount[row.project]++;

}

if(row.tanggal_resign){

resign++;

}

if(row.pkwt_kadaluarsa){

const exp =
new Date(row.pkwt_kadaluarsa);

const diff =
Math.ceil(
(exp - today)
/(1000*60*60*24)
);

if(diff <= 60){

pkwt++;

let warna='green';

if(diff<=30){

warna='red';

}else if(diff<=60){

warna='orange';

}

html += `
<tr>

<td>${row.project||''}</td>
<td>${row.nopeg||''}</td>
<td>${row.nama||''}</td>
<td>${row.jabatan||''}</td>
<td>${row.pkwt_kadaluarsa}</td>
<td class="${warna}">
${diff} Hari
</td>

</tr>
`;

}

}

if(row.mcu_kadaluarsa){

const exp =
new Date(row.mcu_kadaluarsa);

const diff =
Math.ceil(
(exp - today)
/(1000*60*60*24)
);

if(diff <= 60){

mcu++;

}

}

});

document
.getElementById('aktif')
.innerHTML = aktif;

document
.getElementById('resign')
.innerHTML = resign;

document
.getElementById('pkwt')
.innerHTML = pkwt;

document
.getElementById('mcu')
.innerHTML = mcu;

document
.getElementById('tblPKWT')
.innerHTML = html;

const labels =
Object.keys(projectCount);

const values =
Object.values(projectCount);

new Chart(

document.getElementById(
'projectChart'
),

{

type:'bar',

data:{

labels:labels,

datasets:[{

label:
'Karyawan Aktif',

data:values

}]

}

}

);

}

</script>

</body>
</html>
